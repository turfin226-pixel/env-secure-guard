<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MangaVerse — Read, Create & Vote</title>
  <meta name="description" content="MangaVerse is where creators share original manga and readers vote on story decisions. Be part of the journey." />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── AUTH SCREEN ── -->
  <div id="authScreen">
    <div class="auth-bg">
      <div class="auth-orb orb1"></div>
      <div class="auth-orb orb2"></div>
    </div>
    <div class="auth-center">
      <div class="brand-logo">
        <span class="brand-icon">⚡</span>
        <span class="brand-name">MangaVerse</span>
      </div>
      <p class="brand-tagline">Creators share manga. Readers shape the story.</p>

      <!-- Login -->
      <div id="loginForm" class="auth-card">
        <h2>Welcome Back</h2>
        <p class="auth-sub">Sign in to continue</p>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" />
        </div>
        <button class="btn-primary w-full" id="loginBtn">Sign In</button>
        <button class="btn-google w-full" id="googleLoginBtn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" /> Continue with Google
        </button>
        <p class="auth-switch">No account? <span onclick="showRegister()">Create one</span></p>
      </div>

      <!-- Register -->
      <div id="registerForm" class="auth-card hidden">
        <h2>Join MangaVerse</h2>
        <p class="auth-sub">Create your account</p>
        <div class="role-selector">
          <button class="role-btn active" id="roleReader" onclick="selectRole('reader')">📖 Reader</button>
          <button class="role-btn" id="roleCreator" onclick="selectRole('creator')">✏️ Creator</button>
        </div>
        <div class="form-group">
          <label>Display Name</label>
          <input type="text" id="regName" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min 6 characters" />
        </div>
        <button class="btn-primary w-full" id="registerBtn">Create Account</button>
        <button class="btn-google w-full" id="googleRegisterBtn">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" /> Continue with Google
        </button>
        <p class="auth-switch">Have account? <span onclick="showLogin()">Sign in</span></p>
      </div>
    </div>
  </div>

  <!-- ── APP SHELL ── -->
  <div id="appShell" class="hidden">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <span class="brand-icon">⚡</span>
        <span class="brand-name">MangaVerse</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" id="nav-discover" onclick="navigate('discover')">
          <span class="nav-icon">🔍</span><span class="nav-label">Discover</span>
        </a>
        <a class="nav-item" id="nav-creator" onclick="navigate('creator')">
          <span class="nav-icon">✏️</span><span class="nav-label">Create</span>
        </a>
        <a class="nav-item" id="nav-profile" onclick="navigate('profile')">
          <span class="nav-icon">👤</span><span class="nav-label">Profile</span>
        </a>
      </nav>
      <button class="btn-signout" onclick="signOut()">🚪 Sign Out</button>
    </aside>

    <!-- Main -->
    <div class="main-wrap">
      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <div class="menu-toggle" onclick="toggleSidebar()">☰</div>
          <h1 class="page-title" id="pageTitle">Discover</h1>
        </div>
        <div class="topbar-right">
          <div class="search-wrap">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Search manga..." onkeyup="handleSearch(this.value)" />
          </div>
          <div class="user-avatar" id="userAvatar">U</div>
        </div>
      </header>

      <!-- Content -->
      <main id="mainContent" class="main-content">
        <div class="loading-state"><div class="spinner"></div></div>
      </main>
    </div>
  </div>

  <!-- ── MODAL ── -->
  <div id="modalOverlay" class="hidden" onclick="closeModal()">
    <div id="modalContent" onclick="event.stopPropagation()"></div>
  </div>

  <!-- ── TOAST ── -->
  <div id="toast" class="toast hidden"></div>

  <!-- ── LOADING OVERLAY ── -->
  <div id="loadingOverlay" class="hidden">
    <div class="spinner big"></div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut as fbSignOut, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, getDoc, doc, updateDoc, setDoc, query, orderBy, limit, where, onSnapshot, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // ── FIREBASE CONFIG (user fills this in) ──
    const firebaseConfig = {
      apiKey: "AIzaSyC0wnOzvPQ3g0O0hand3cAdez2ikMLv2Vs",
      authDomain: "mangaverese.firebaseapp.com",
      projectId: "mangaverese",
      storageBucket: "mangaverese.firebasestorage.app",
      messagingSenderId: "1019245187393",
      appId: "1:1019245187393:web:f3704e47353f03aeae51c0"
    };

    const app = initializeApp(firebaseConfig);
    window.auth = getAuth(app);
    window.db   = getFirestore(app);
    window.FB = { createUserWithEmailAndPassword, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, fbSignOut, updateProfile, collection, addDoc, getDocs, getDoc, doc, updateDoc, setDoc, query, orderBy, limit, where, onSnapshot, increment, serverTimestamp };

    // Boot
    window.FB.onAuthStateChanged(window.auth, user => {
      if (user) {
        window.currentUser = user;
        document.getElementById('authScreen').classList.add('hidden');
        document.getElementById('appShell').classList.remove('hidden');
        document.getElementById('userAvatar').textContent = (user.displayName || user.email || 'U')[0].toUpperCase();
        navigate('discover');
      } else {
        window.currentUser = null;
        document.getElementById('appShell').classList.add('hidden');
        document.getElementById('authScreen').classList.remove('hidden');
      }
    });
  </script>

  <script src="auth.js"></script>
  <script src="discover.js"></script>
  <script src="reader.js"></script>
  <script src="creator.js"></script>
  <script src="profile.js"></script>
  <script src="app.js"></script>

  <script>
    // Force clear ALL old caches and unregister old service workers
    // This fixes phone showing old vpcoin/store/leaderboard files
    if ('serviceWorker' in navigator) {
      // Step 1: Unregister ALL old service workers
      navigator.serviceWorker.getRegistrations().then(registrations => {
        registrations.forEach(reg => {
          // Unregister everything except current scope
          reg.unregister();
        });
      });

      // Step 2: Clear ALL old caches
      if ('caches' in window) {
        caches.keys().then(keys => {
          keys.forEach(key => {
            if (key !== 'mangaverse-v3') {
              caches.delete(key);
            }
          });
        });
      }

      // Step 3: Register fresh SW (after short delay to let unregister complete)
      setTimeout(() => {
        navigator.serviceWorker.register('/sw.js?v=3').catch(() => {});
      }, 500);
    }
  </script>
</body>
</html>
